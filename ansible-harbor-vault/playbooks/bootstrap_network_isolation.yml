---
- hosts: localhost
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../inventories/group_vars/all.yml"
  pre_tasks:
    - name: Prefer AWS_DEFAULT_REGION environment variable
      ansible.builtin.set_fact:
        aws_region: "{{ lookup('env', 'AWS_DEFAULT_REGION') | default(aws_region | default('us-east-1')) }}"

  tasks:
    - name: AWS calls (vault credentials environment variables)
      block:
        - name: Optional organization OU/SCP (management account)
          ansible.builtin.include_role:
            name: org_isolation
          when: vault_org_parent_id is defined and (vault_org_parent_id | string | trim | length) > 0

        - name: Optional VPC ingress/egress zones and endpoints
          ansible.builtin.include_role:
            name: network_isolation
          when: vault_network_isolation_enabled | default(false) | bool

        - name: Optional EventBridge/Lambda time-bound vault writer policy
          ansible.builtin.include_role:
            name: time_bound_access
          when: vault_time_bound_access | default(false) | bool
      environment:
        AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
        AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
        AWS_SESSION_TOKEN: "{{ lookup('env', 'AWS_SESSION_TOKEN') | default('') }}"
        AWS_DEFAULT_REGION: "{{ aws_region }}"
      no_log: false
