---
- hosts: localhost
  gather_facts: false
  pre_tasks:
    - name: Load ansible-harbor-vault/.env
      ansible.builtin.shell: |
        python3 - <<'PY'
        import json, os, pathlib
        p = pathlib.Path(os.environ["ENV_FILE"])
        d = {}
        for line in p.read_text().splitlines():
            line = line.strip()
            if not line or line.startswith("#"):
                continue
            k, _, v = line.partition("=")
            if k:
                d[k.strip()] = v.strip().strip('"').strip("'")
        print(json.dumps(d))
        PY
      environment:
        ENV_FILE: "{{ playbook_dir }}/../.env"
      register: env_json
      changed_when: false
      # Shell is skipped in --check by default; we need .env parsed for dry-run.
      check_mode: false
      no_log: false

    - name: Apply .env to facts
      ansible.builtin.set_fact:
        vault_dotenv: "{{ env_json.stdout | from_json }}"
      no_log: false

    - name: Prefer AWS_DEFAULT_REGION from .env
      ansible.builtin.set_fact:
        aws_region: "{{ vault_dotenv.AWS_DEFAULT_REGION | default(aws_region | default('us-east-1')) }}"

  tasks:
    - name: Bootstrap vault
      block:
        - name: Get AWS account ID for IAM role trust policy
          amazon.aws.aws_caller_info:
          register: aws_caller

        - name: Resolve trusted_account_id for VaultWriteRole
          ansible.builtin.set_fact:
            trusted_account_id: >-
              {{
                trusted_account_id
                if (
                  trusted_account_id is defined
                  and (trusted_account_id | string | trim | length) > 0
                  and (trusted_account_id | string) != '111111111111'
                )
                else aws_caller.account
              }}

        - ansible.builtin.include_role:
            name: kms
        - ansible.builtin.include_role:
            name: s3_vault
        - ansible.builtin.include_role:
            name: forensic_scanning
          when: vault_forensic_scanning_enabled | default(false) | bool
        - ansible.builtin.include_role:
            name: iam_writer
        - ansible.builtin.include_role:
            name: logging_monitoring
          when: vault_logging_monitoring_enabled | default(false) | bool
      environment:
        AWS_ACCESS_KEY_ID: "{{ vault_dotenv.AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ vault_dotenv.AWS_SECRET_ACCESS_KEY }}"
        AWS_SESSION_TOKEN: "{{ vault_dotenv.AWS_SESSION_TOKEN | default('') }}"
        AWS_DEFAULT_REGION: "{{ aws_region }}"
