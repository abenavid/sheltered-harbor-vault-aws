- name: Debug
  ansible.builtin.debug: "{{ backup_rule_schedule }}"

- name: Create logically air-gapped Backup Vault
  ansible.builtin.command: >
    aws backup create-backup-plan
    --region {{ aws_region }}
    --cli-input-json "{{ backup_json | to_json }}"
  delegate_to: localhost


