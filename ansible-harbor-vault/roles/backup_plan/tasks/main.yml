---
    # - name: Create an AWS Backup Vault (optional, 'Default' is used if not specified)
    #   amazon.aws.backup_vault:
    #     name: "{{ backup_vault_name }}"
    #     state: present
    #     # Optionally specify a KMS key ARN for encryption
    #     # encryption_key_arn: "arn:aws:kms:us-east-1:123456789012:key/..."
    #   register: vault_result
    #   # This task is idempotent, it only creates the vault if it doesn't exist.

    - name: Create/Update the AWS Backup Plan
      amazon.aws.backup_plan:
        backup_plan_name: "{{ backup_plan_name }}"
        state: present
        rules:
          - rule_name: "{{ backup_rule_name }}"
            target_backup_vault_name: "{{ backup_vault_name }}"
            # Schedule a daily backup using a cron expression (e.g., 5 AM UTC daily)
            schedule_expression: "{{ backup_rule_schedule }}"
            # Lifecycle: move to cold storage after 30 days, delete after 90 days
            lifecycle:
              move_to_cold_storage_after_days: "{{ backup_cold_storage_days }}"
              delete_after_days: "{{ backup_delete_after_days }}"
      register: plan_result
      # The IAM role for AWS Backup (AWSBackupDefaultServiceRole) needs permissions
      # to perform backup operations on your behalf.

