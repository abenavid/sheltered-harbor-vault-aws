---
- name: Install aws cli tool
  ansible.builtin.dnf:
    name: awscli
    state: present
  become: true

- name: Create logically air-gapped Backup Vault
  ansible.builtin.command:
    argv:
    - aws backup create-logically-air-gapped-backup-vault
    - --region {{ aws_region }}
    - --backup-vault-name sampleName
    - --min-retention-days 7
    - --max-retention-days 35
    - --encryption-key-arn {{ vault_kms_key_arn }}
  delegate_to: localhost
  register: create_vault_response

- name: Set the ARN (Amazon Resource Name) of the vault
  ansible.builtin.set_fact:
    vault_arn: "{{ create_vault_response.BackupVaultArn }}"

# Logically air-gapped backup vaults are identified by names that are
# unique to the account used to create them and the Region where they are created.
- name: The name of a logical container where backups are stored
  ansible.builtin.set_fact:
    vault_unique_name: "{{ create_vault_response.BackupVaultName }}"
