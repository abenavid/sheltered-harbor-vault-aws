---
- amazon.aws.iam_role:
    name: VaultWriteRole
    assume_role_policy_document:
      Version: "2012-10-17"
      Statement:
        - Effect: Allow
          Principal:
            AWS: "arn:aws:iam::{{ trusted_account_id }}:root"
          Action: sts:AssumeRole
    state: present

- amazon.aws.iam_policy:
    iam_type: role
    iam_name: VaultWriteRole
    policy_name: VaultWritePolicy
    policy_json: "{{ vault_writer_policy | to_json }}"
    state: present
  vars:
    vault_writer_policy:
      Version: "2012-10-17"
      Statement:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:PutObjectRetention
          Resource: "arn:aws:s3:::{{ vault_bucket_name }}/*"
        - Effect: Allow
          Action:
            - kms:Encrypt
            - kms:GenerateDataKey
          Resource: "{{ vault_kms_key_arn }}"
