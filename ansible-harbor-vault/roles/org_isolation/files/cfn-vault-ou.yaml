AWSTemplateFormatVersion: '2010-09-09'
Description: Sheltered Harbor vault OU and optional SCP (management account only)

Parameters:
  ParentId:
    Type: String
    Description: Root ID (r-xxxx) or parent OU ID for the new vault OU

Resources:
  VaultOU:
    Type: AWS::Organizations::OrganizationalUnit
    Properties:
      Name: ShelteredHarborVault
      ParentId: !Ref ParentId

  VaultOUIsolationPolicy:
    Type: AWS::Organizations::Policy
    Properties:
      Name: VaultOULeaveOrganizationDeny
      Description: Deny member accounts from leaving the organization (example isolation control)
      Type: SERVICE_CONTROL_POLICY
      Content: '{"Version":"2012-10-17","Statement":[{"Effect":"Deny","Action":["organizations:LeaveOrganization"],"Resource":"*"}]}'
      TargetIds:
        - !Ref VaultOU

Outputs:
  VaultOUId:
    Description: Organizational unit ID for the vault workload
    Value: !Ref VaultOU
