---
- amazon.aws.s3_bucket:
    name: "{{ vault_bucket_name }}"
    region: "{{ aws_region }}"
    state: present
    versioning: true
    object_lock_enabled: true
    object_lock_default_retention:
      mode: COMPLIANCE
      years: "{{ vault_retention_years | int }}"
    public_access:
      block_public_acls: true
      block_public_policy: true
      ignore_public_acls: true
      restrict_public_buckets: true
    encryption: aws:kms
    encryption_key_id: "{{ vault_kms_key_arn }}"
    policy: "{{ vault_bucket_tls_policy | to_json }}"
  vars:
    vault_bucket_tls_policy:
      Version: "2012-10-17"
      Statement:
        - Sid: DenyInsecureTransport
          Effect: Deny
          Principal: "*"
          Action: "s3:*"
          Resource:
            - "arn:aws:s3:::{{ vault_bucket_name }}"
            - "arn:aws:s3:::{{ vault_bucket_name }}/*"
          Condition:
            Bool:
              "aws:SecureTransport": "false"
