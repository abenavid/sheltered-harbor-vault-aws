version: 3

images:
  base_image:
    name: registry.redhat.io/ubi8/ubi:latest

dependencies:
  python_interpreter:
    package_system: python3.11
    python_path: /usr/bin/python3.11
  ansible_core:
    package_pip: ansible-core~=2.18
  ansible_runner:
    package_pip: ansible-runner~=2.4
  system:
  - awscli
  galaxy: requirements.yml
  python: requirements.txt